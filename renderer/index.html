<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChessOpenings</title>
  <link rel="stylesheet" href="../assets/chessboard.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <a class="header-logo" href="index.html">
        <svg class="logo-crown" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 13h16M1 13L3.5 5.5L7 9.5L9 1.5L11 9.5L14.5 5.5L17 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo-text"><span>Chess</span>Openings</span>
      </a>
      <span class="header-badge">Free · Offline · Open source</span>
    </div>

    <div class="header-search">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search openings..." autocomplete="off">
    </div>

    <div class="header-right">
      <div class="streak-widget" id="streakWidget">
        <svg class="streak-icon" viewBox="0 0 14 18" fill="none">
          <path d="M7 17c3.5 0 6-2.5 6-5.5 0-2-1-3.5-2-4.5 0 1.5-.8 2.5-1.8 2.8C9.5 8 8.5 5.5 7 3c0 2.5-1.5 4-1.5 5.5C4.5 8.2 4 7.5 4 6.5 2.5 8 1 10 1 11.5 1 14.5 3.5 17 7 17z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="none"/>
        </svg>
        <span class="streak-count" id="streakCount">0</span>
      </div>

      <button class="theme-toggle" id="themeToggle">
        <svg id="iconMoon" viewBox="0 0 24 24" fill="none">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <svg id="iconSun" viewBox="0 0 24 24" fill="none" style="display:none">
          <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>

      <button class="theme-toggle" onclick="window.location.href='review.html'" title="Daily Review">
        <svg viewBox="0 0 18 18" fill="none">
          <rect x="2" y="4.5" width="10" height="11" rx="1.6" stroke="currentColor" stroke-width="1.4"/>
          <path d="M5.5 2.5h9A1.5 1.5 0 0116 4v9.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M4.8 10l1.7 1.7 2.9-3.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="theme-toggle" onclick="window.location.href='stats.html'" title="Statistics">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M2.5 13.5v-4M8 13.5V5M13.5 13.5V2.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>

      <button class="theme-toggle" onclick="window.location.href='settings.html'" title="Settings">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M2 4.5h12M2 11.5h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="5.5" cy="4.5" r="2" fill="var(--bg-header)" stroke="currentColor" stroke-width="1.3"/>
          <circle cx="10.5" cy="11.5" r="2" fill="var(--bg-header)" stroke="currentColor" stroke-width="1.3"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Filter bar -->
  <div class="filter-bar">
    <div class="filter-dropdown-wrapper">
      <button class="filters-btn" id="filtersBtn">
        <svg viewBox="0 0 14 12" fill="none">
          <path d="M1 2h12M3 6h8M5 10h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Filters
        <span class="filters-badge" id="filtersBadge"></span>
      </button>

      <div class="filter-dropdown" id="filtersDropdown">

        <div class="filter-section">
          <div class="filter-section-label">Difficulty</div>
          <div id="difficultyOptions">
            <div class="filter-option selected" data-type="difficulty" data-value="all">
              <span class="filter-option-dot all"></span>
              All openings
              <svg class="filter-checkmark" viewBox="0 0 14 14" fill="none">
                <path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-option" data-type="difficulty" data-value="beginner">
              <span class="filter-option-dot beginner"></span>
              Beginner
              <svg class="filter-checkmark" viewBox="0 0 14 14" fill="none">
                <path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-option" data-type="difficulty" data-value="intermediate">
              <span class="filter-option-dot intermediate"></span>
              Intermediate
              <svg class="filter-checkmark" viewBox="0 0 14 14" fill="none">
                <path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-option" data-type="difficulty" data-value="advanced">
              <span class="filter-option-dot advanced"></span>
              Advanced
              <svg class="filter-checkmark" viewBox="0 0 14 14" fill="none">
                <path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-option" data-type="difficulty" data-value="fun">
              <span class="filter-option-dot fun"></span>
              Fun
              <svg class="filter-checkmark" viewBox="0 0 14 14" fill="none">
                <path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-option" data-type="difficulty" data-value="trap">
              <span class="filter-option-dot trap"></span>
              Traps
              <svg class="filter-checkmark" viewBox="0 0 14 14" fill="none">
                <path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-section-label">Color</div>
          <div id="sideOptions">
            <div class="filter-option selected" data-type="side" data-value="both">
              <span class="side-dot both"></span>
              Both sides
              <svg class="filter-checkmark" viewBox="0 0 14 14" fill="none">
                <path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-option" data-type="side" data-value="white">
              <span class="side-dot white"></span>
              White pieces
              <svg class="filter-checkmark" viewBox="0 0 14 14" fill="none">
                <path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-option" data-type="side" data-value="black">
              <span class="side-dot black"></span>
              Black pieces
              <svg class="filter-checkmark" viewBox="0 0 14 14" fill="none">
                <path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-section-label">Show</div>
          <div id="showOptions">
            <div class="filter-option selected" data-type="show" data-value="all">
              <span class="filter-option-dot all"></span>
              Everything
              <svg class="filter-checkmark" viewBox="0 0 14 14" fill="none">
                <path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-option" data-type="show" data-value="favorites">
              <span class="filter-option-dot favorite"></span>
              Favorites only
              <svg class="filter-checkmark" viewBox="0 0 14 14" fill="none">
                <path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Active filter chips -->
    <div class="active-filters" id="activeFilters"></div>
  </div>

  <!-- Grid -->
  <main class="main-content">
    <div class="review-banner" id="reviewBanner" style="display:none"></div>
    <div class="openings-grid" id="openingsGrid"></div>
  </main>

  <!-- Streak toast -->
  <div class="streak-toast" id="streakToast">
    <svg width="16" height="18" viewBox="0 0 14 18" fill="none" style="color:var(--streak-color)">
      <path d="M7 17c3.5 0 6-2.5 6-5.5 0-2-1-3.5-2-4.5 0 1.5-.8 2.5-1.8 2.8C9.5 8 8.5 5.5 7 3c0 2.5-1.5 4-1.5 5.5C4.5 8.2 4 7.5 4 6.5 2.5 8 1 10 1 11.5 1 14.5 3.5 17 7 17z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
    </svg>
    <span id="streakToastMsg"></span>
  </div>

  <!-- Streak modal -->
  <div class="streak-modal-overlay" id="streakModal">
    <div class="streak-modal-box">
      <svg id="streakModalFlame" class="streak-modal-flame" viewBox="0 0 14 18" fill="none">
        <path d="M7 17c3.5 0 6-2.5 6-5.5 0-2-1-3.5-2-4.5 0 1.5-.8 2.5-1.8 2.8C9.5 8 8.5 5.5 7 3c0 2.5-1.5 4-1.5 5.5C4.5 8.2 4 7.5 4 6.5 2.5 8 1 10 1 11.5 1 14.5 3.5 17 7 17z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="currentColor"/>
      </svg>
      <div class="streak-modal-count" id="streakModalCount">0 day streak</div>
      <div class="streak-modal-msg" id="streakModalMsg">Start a streak by completing a line today!</div>
      <div class="streak-week" id="streakWeek"></div>
    </div>
  </div>

  <script src="../assets/jquery.min.js"></script>
  <script src="../assets/chess.js"></script>
  <script src="../assets/chessboard.js"></script>
  <script src="openings.js"></script>
  <script src="sides.js"></script>
  <script src="streak.js"></script>
  <script src="board-theme.js"></script>
  <script src="app.js"></script>
</body>
</html>
